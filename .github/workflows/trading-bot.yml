name: Trading Bot

on:
  schedule:
    - cron: '0 */5 * * *'   # restart every 5 hours (under GitHub's 6h limit)
  workflow_dispatch:          # manual trigger from GitHub UI

permissions:
  contents: write             # needed to push logs branch

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 300      # 5 hours

    steps:
      - uses: actions/checkout@v4

      - name: Restore cumulative logs from logs branch
        run: |
          git fetch origin logs:logs 2>/dev/null || true
          if git show-ref --quiet refs/heads/logs; then
            git checkout logs -- logs/ 2>/dev/null || true
            git checkout main
          fi
          mkdir -p logs

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading bot
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m bot.main

      - name: Push logs to Gist
        if: always()
        env:
          GH_GIST_TOKEN: ${{ secrets.GH_GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          python - <<'EOF'
import json, os, urllib.request

token = os.environ["GH_GIST_TOKEN"]
gist_id = os.environ["GIST_ID"]

files = {}
for fname in ["trades.csv", "daily_pnl.csv", "bot.log", ".last_briefing_date"]:
    path = f"logs/{fname}"
    if os.path.exists(path):
        with open(path) as f:
            files[fname] = {"content": f.read() or " "}

if not files:
    print("No log files to push")
    exit(0)

payload = json.dumps({"files": files}).encode()
req = urllib.request.Request(
    f"https://api.github.com/gists/{gist_id}",
    data=payload,
    method="PATCH",
    headers={
        "Authorization": f"Bearer {token}",
        "Accept": "application/vnd.github+json",
        "Content-Type": "application/json",
    },
)
with urllib.request.urlopen(req) as resp:
    result = json.loads(resp.read())
    print(f"Gist updated: {result['html_url']}")
EOF
